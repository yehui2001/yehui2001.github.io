---
layout: default
---
<article class="page-shell">
  <header class="page-heading">
    {% if page.eyebrow %}<div class="section-kicker">{{ page.eyebrow }}</div>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p>{{ page.description }}</p>{% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
